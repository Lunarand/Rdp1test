name: RDP (fxTunnel + Essential Apps)

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:    
      - name: Configure Core RDP Settings    
        run: |    
          # --- AUDIO & SESSION FIXES START HERE ---    
          Set-Service -Name Audiosrv -StartupType Automatic    
          Start-Service -Name Audiosrv    
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableAudioCapture" -Value 0 -Force    
          # --- ADD THIS LINE TO KEEP SESSION ACTIVE IN BACKGROUND ---    
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxDisconnectionTime" -Value 0 -Force    
          # --- FIXES END HERE ---    

          # Enable Remote Desktop and disable Network Level Authentication (if needed)    
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `    
                             -Name "fDenyTSConnections" -Value 0 -Force    
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `    
                             -Name "UserAuthentication" -Value 0 -Force    
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `    
                             -Name "SecurityLayer" -Value 0 -Force    

          # Remove any existing rule with the same name to avoid duplication    
          netsh advfirewall firewall delete rule name="RDP-Tunnel"    
              
          # Allow any incoming connection on port 3389    
          netsh advfirewall firewall add rule name="RDP-Tunnel" `    
            dir=in action=allow protocol=TCP localport=3389    

          # (Optional) Restart the Remote Desktop service to ensure changes take effect    
          Restart-Service -Name TermService -Force    

      - name: Create RDP User with Secure Password    
        env:    
          MY_SECRET_PASS: ${{ secrets.PASS }}    
        run: |    
          # Check if secret exists    
          if (-not $env:MY_SECRET_PASS) {    
              Write-Error "Error: Secret 'PASS' is empty or missing. Please add it in Repository Settings."    
              exit 1    
          }    

          # Use the Secret Password    
          $password = $env:MY_SECRET_PASS    
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force    
              
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires    
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"    
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"    
              
          # We set the env variable to (Hidden) so it doesn't show in logs later    
          echo "RDP_CREDS=User: RDP | Password: (Hidden - Check your Secrets)" >> $env:GITHUB_ENV    
              
          if (-not (Get-LocalUser -Name "RDP")) {    
              Write-Error "User creation failed"    
              exit 1    
          }    

      - name: Install Essential Apps    
        run: |    
          Write-Host "Installing Apps..."    
              
          # 1. Install via Chocolatey (Removed heavy/unnecessary software)
          choco install winrar -y --no-progress    
          choco install googlechrome -y --no-progress --ignore-checksums    
          choco install brave -y --no-progress    
          choco install discord -y --no-progress    
              
          # 2. FIX BRAVE: Move to Public Folder    
          $BraveAdmin = "C:\Users\runneradmin\AppData\Local\BraveSoftware"    
          if (Test-Path $BraveAdmin) {    
              Copy-Item -Path $BraveAdmin -Destination "C:\" -Recurse -Force    
          }    

          # 3. FIX DISCORD: Move to Public Folder    
          $DiscordAdmin = "C:\Users\runneradmin\AppData\Local\Discord"    
          if (Test-Path $DiscordAdmin) {    
              Copy-Item -Path $DiscordAdmin -Destination "C:\" -Recurse -Force    
          }    
              
          # 4. Create Desktop Shortcuts    
          $WshShell = New-Object -comObject WScript.Shell    
              
          # Brave Shortcut    
          $BraveLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Brave.lnk")    
          $BraveLnk.TargetPath = "C:\BraveSoftware\Brave-Browser\Application\brave.exe"    
          $BraveLnk.Save()    

          # Discord Shortcut    
          $DiscordExe = Get-ChildItem -Path "C:\Discord" -Recurse -Filter "Discord.exe" | Select-Object -First 1    
          if ($DiscordExe) {    
              $DiscordLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Discord.lnk")    
              $DiscordLnk.TargetPath = $DiscordExe.FullName    
              $DiscordLnk.Save()    
          }    

          # WinRAR Shortcut    
          $RarLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\WinRAR.lnk")    
          $RarLnk.TargetPath = "C:\Program Files\WinRAR\WinRAR.exe"    
          $RarLnk.Save()    
              
          Write-Host "Installation & Shortcuts Complete."    

      - name: Start fxTunnel & Maintain Connection    
        env:
          FXTUN_TOKEN: ${{ secrets.FXTUN_TOKEN }}
        run: |    
          # Check if fxTunnel token exists
          if (-not $env:FXTUN_TOKEN) {    
              Write-Error "Error: Secret 'FXTUN_TOKEN' is empty. Please add it in Repository Settings."    
              exit 1    
          }  

          # 1. Install fxTunnel    
          Write-Host "Installing fxTunnel..."
          irm https://fxtun.dev/install.ps1 | iex
              
          # 2. Login to fxTunnel
          Write-Host "Authenticating with fxTunnel..."
          fxtun login --token $env:FXTUN_TOKEN
          
          # 3. Start fxTunnel in Background
          Start-Process -FilePath "fxtun" -ArgumentList "tcp 3389" -RedirectStandardOutput "fxtun.log" -PassThru    
              
          Write-Host "fxTunnel started. Scanning for address..."    
              
          # 4. Find Address    
          $address = $null    
          $i = 0    
          while ($i -lt 150) { # Wait up to 5 mins    
              if (Test-Path "fxtun.log") {    
                  $content = Get-Content "fxtun.log"    
                  # Scans the log for the public endpoint (e.g., tunnel.fxtun.dev:41234)
                  $match = $content | Select-String "([a-zA-Z0-9.-]+\.fxtun\.dev:[0-9]+)"    
                  if ($match) {    
                      $address = $match.Matches.Groups[1].Value    
                      break    
                  }    
              }    
              Start-Sleep -Seconds 2    
              $i++    
          }    
              
          if (-not $address) {    
             Write-Error "Failed to get fxTunnel address. Check the logs below:"
             if (Test-Path "fxtun.log") { Get-Content "fxtun.log" }   
             exit 1    
          }    
              
          # 5. Show Details    
          Write-Host "`n=== RDP ACCESS ==="    
          Write-Host "Address: $address"    
          Write-Host "Username: RDP"    
          Write-Host "Password: (Hidden - Check your Secrets)"    
          Write-Host "==================`n"    
              
          # 6. Keep runner active indefinitely    
          while ($true) {    
              Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"    
              Start-Sleep -Seconds 300    
          }
