name: Fast RDP (Serveo Authenticated)

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:    
      - name: Configure Core RDP Settings    
        run: |    
          # --- AUDIO & SESSION FIXES ---    
          Set-Service -Name Audiosrv -StartupType Automatic    
          Start-Service -Name Audiosrv    
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableAudioCapture" -Value 0 -Force    
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxDisconnectionTime" -Value 0 -Force    

          # Enable Remote Desktop
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force    
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force    
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force    

          # Firewall
          netsh advfirewall firewall delete rule name="RDP-Tunnel"    
          netsh advfirewall firewall add rule name="RDP-Tunnel" dir=in action=allow protocol=TCP localport=3389    

          Restart-Service -Name TermService -Force    

      - name: Create RDP User  
        env:    
          MY_SECRET_PASS: ${{ secrets.PASS }}    
        run: |    
          if (-not $env:MY_SECRET_PASS) {    
              Write-Error "Error: Secret 'PASS' is missing."    
              exit 1    
          }    
          $password = $env:MY_SECRET_PASS    
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force    
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires    
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"    
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"    

      - name: Install Essential Apps & Browsers   
        run: |    
          Write-Host "Installing apps (Chrome, Brave, Firefox, WinRAR)..."    
          choco install winrar googlechrome brave firefox -y --no-progress --ignore-checksums

          $BraveAdmin = "C:\Users\runneradmin\AppData\Local\BraveSoftware"    
          if (Test-Path $BraveAdmin) {    
              Copy-Item -Path $BraveAdmin -Destination "C:\" -Recurse -Force    
          }    
              
          $WshShell = New-Object -comObject WScript.Shell    
              
          $BraveLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Brave.lnk")    
          $BraveLnk.TargetPath = "C:\BraveSoftware\Brave-Browser\Application\brave.exe"    
          $BraveLnk.Save()    

          $RarLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\WinRAR.lnk")    
          $RarLnk.TargetPath = "C:\Program Files\WinRAR\WinRAR.exe"    
          $RarLnk.Save()    
              
          Write-Host "Installation & Shortcuts Complete."

      - name: Start Persistent Serveo Tunnel    
        env:
          SERVEO_KEY: ${{ secrets.SERVEO_KEY }}
        run: |    
          if (-not $env:SERVEO_KEY) {    
              Write-Error "Error: Secret 'SERVEO_KEY' is missing. Please add it to your repo secrets."    
              exit 1    
          }  

          Write-Host "Configuring SSH Key Permissions..."
          # Ensure .ssh directory exists
          $SshDir = "$env:USERPROFILE\.ssh"
          if (-not (Test-Path $SshDir)) { New-Item -ItemType Directory -Path $SshDir | Out-Null }
          
          # Save key strictly without formatting artifacts to prevent SSH errors
          $KeyPath = "$SshDir\serveo_key"
          [System.IO.File]::WriteAllText($KeyPath, $env:SERVEO_KEY + "`n")
          
          # Fix Windows permissions so OpenSSH accepts the private key securely
          icacls $KeyPath /inheritance:r
          icacls $KeyPath /grant:r "$($env:USERNAME):(R)"
          
          Write-Host "Creating Auto-Reconnect Loop..."
          $batchScript = @"
          :loop
          echo Starting Serveo Tunnel... >> serveo.log
          ssh -i "$KeyPath" -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o BatchMode=yes -R 0:localhost:3389 serveo.net >> serveo.log 2>&1
          echo Tunnel dropped - reconnecting in 2s... >> serveo.log
          timeout /t 2 /nobreak >nul
          goto loop
          "@
          Set-Content -Path "tunnel_loop.bat" -Value $batchScript
          
          Write-Host "Starting background tunnel process..."
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c tunnel_loop.bat" -WindowStyle Hidden
              
          $address = $null    
          $i = 0    
          while ($i -lt 30) { # Wait up to 60 seconds   
              if (Test-Path "serveo.log") { 
                  $logContent = Get-Content "serveo.log" -Raw 
                  # Scans for the Serveo address (e.g. serveo.net:45812)
                  $match = $logContent | Select-String -Pattern "(serveo\.net:\d+)" -AllMatches
                  if ($match) {    
                      $address = $match.Matches[-1].Groups[1].Value    
                      break    
                  }    
              }
              Start-Sleep -Seconds 2    
              $i++    
          }    
              
          if (-not $address) {    
             Write-Host "Failed to get Serveo address. Here are the logs:"
             if (Test-Path "serveo.log") { Get-Content "serveo.log" }   
             exit 1    
          }    
              
          Write-Host "`n=== RDP ACCESS ==="    
          Write-Host "Address: $address"    
          Write-Host "Username: RDP"    
          Write-Host "Password: (Hidden - Check your Secrets)"    
          Write-Host "==================`n"    
          
          # This loop keeps the runner alive and watches for new connections
          $lastAddress = $address
          while ($true) {    
              $logContent = Get-Content "serveo.log" -Raw 
              $match = $logContent | Select-String -Pattern "(serveo\.net:\d+)" -AllMatches
              
              if ($match) {
                  $currentAddress = $match.Matches[-1].Groups[1].Value
                  if ($currentAddress -ne $lastAddress) {
                      Write-Host "`n[!] TUNNEL DROPPED AND RECONNECTED!"
                      Write-Host "NEW Address: $currentAddress`n"
                      $lastAddress = $currentAddress
                  }
              }
              
              Write-Host "[$(Get-Date)] RDP Active (Current Address: $lastAddress)"    
              Start-Sleep -Seconds 300    
          }
